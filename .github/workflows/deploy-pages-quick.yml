# オープンキャンパス取得・メール通知なし。main の docs をそのまま MkDocs ビルドして Pages へ載せる。
# Actions タブ → 本ワークフロー → 「Run workflow」で即確認用。
#
# deploy が「Failed to create deployment (404)」のとき:
# Settings → Pages で Source を必ず「GitHub Actions」にすること（Branch 選択のままだと 404 になる）。
# https://github.com/mtakahashi1150/univ_info_cursor/settings/pages
name: Deploy MkDocs (quick)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build static site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
