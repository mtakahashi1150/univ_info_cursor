site_name: 大学OC情報（univ_info_cursor）
site_description: 検証済み URL から取得した OC 情報の累積表
site_url: https://mtakahashi1150.github.io/univ_info_cursor/
repo_url: https://github.com/mtakahashi1150/univ_info_cursor
edit_uri: edit/main/docs/

theme:
  name: material
  language: ja
  features:
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - md_in_html
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - オープンキャンパス情報: index.md

plugins:
  - search
