# 対象グループ・大学ごとの「情報工学・情報科学系」に該当する学部・学科と、
# オープンキャンパスが主に想定されるキャンパス（首都圏4都県に限定して記載）。
# ※ OC は大学単位・キャンパス単位の開催が中心のため、キャンパスごとに整理しています。

meta:
  area_prefectures:
    - 東京都
    - 神奈川県
    - 千葉県
    - 埼玉県
  focus: 情報工学・情報科学系（および直近の情報理工・データ科学等を含む理工情報系）
  groups_note: 早慶上理・G-MARCHに加え、東京理工系4大学（通称・四工大／東京4理工）を含みます。東京工科大学は四工大協定の正式メンバーではありませんが首都圏私立理工として参考掲載します。

universities:
  - name: 早稲田大学
    group: 早慶上理
    info_departments:
      - 基幹理工学部（情報理工学科ほか）
      - 創造理工学部
      - 先進理工学部
    oc_campuses:
      - { campus: 西早稲田キャンパス, prefecture: 東京都, note: 理工3学部の来校型OCの主会場の一つ }
      - { campus: 早稲田キャンパス, prefecture: 東京都, note: 政治経済・法学等（参考：他学部） }
      - { campus: 戸山キャンパス, prefecture: 東京都, note: 文化構想・文学等（参考） }

  - name: 慶應義塾大学
    group: 早慶上理
    info_departments:
      - 理工学部（情報系領域を含む）
    oc_campuses:
      - { campus: 日吉キャンパス, prefecture: 神奈川県, note: 講義編OC等 }
      - { campus: 三田キャンパス, prefecture: 東京都, note: 学生生活編等 }

  - name: 上智大学
    group: 早慶上理
    info_departments:
      - 理工学部（情報理工学科ほか）
    oc_campuses:
      - { campus: 四谷キャンパス, prefecture: 東京都, note: 夏季OCの主会場 }
      - { campus: 目白聖母キャンパス, prefecture: 東京都, note: 一部プログラム }

  - name: 東京理科大学
    group: 早慶上理
    info_departments:
      - 創域情報学部
      - 工学部（情報工学科等）
      - 先進工学部
    oc_campuses:
      - { campus: 野田キャンパス, prefecture: 千葉県, note: 創域理工・創域情報等 }
      - { campus: 葛飾キャンパス, prefecture: 東京都, note: 工学・先進工学等 }
      - { campus: 神楽坂キャンパス, prefecture: 東京都, note: 理学・経営等（一部理工） }

  - name: 明治大学
    group: G-MARCH
    info_departments:
      - 理工学部（情報科学科）
      - 総合数理学部（情報系領域）
    oc_campuses:
      - { campus: 中野キャンパス, prefecture: 東京都, note: 理工・情報科学科等 }
