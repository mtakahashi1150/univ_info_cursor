  - name: 学習院大学
    group: G-MARCH
    info_departments:
      - （独立の「情報工学・情報科学部」はなし。理学部等のみのため本ツールの自動取得対象外）
    oc_campuses:
      - { campus: 目白キャンパス, prefecture: 東京都, note: 全学部向け来校型OC }
      - { campus: 戸山キャンパス, prefecture: 東京都, note: 国際文化交流学部 }
